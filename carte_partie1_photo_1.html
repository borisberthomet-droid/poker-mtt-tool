<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte Joueur — Profil</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0f1a;display:flex;justify-content:center;padding:16px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.card{width:100%;max-width:360px;border-radius:16px;border:1px solid rgba(255,255,255,0.08);background:#1c1c2e;overflow:hidden}
.card-top{background:#12122a;padding:16px 20px}
.card-badge-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.card-badge select{font-size:10px;font-weight:500;padding:3px 8px;border-radius:20px;background:#FAC775;color:#412402;border:none;outline:none;cursor:pointer;appearance:none}
.card-header{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.card-avatar{width:60px;height:60px;border-radius:50%;background:#3C3489;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:500;color:#CECBF6;flex-shrink:0;border:2px solid rgba(255,255,255,0.12);overflow:hidden;cursor:pointer;position:relative}
.card-avatar img{width:100%;height:100%;object-fit:cover;display:none}
.avatar-initials{position:absolute}
.card-avatar:hover::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,0.4);border-radius:50%}
.card-avatar:hover .avatar-edit{display:flex}
.avatar-edit{display:none;position:absolute;flex-direction:column;align-items:center;justify-content:center;color:#fff;font-size:9px;z-index:2;gap:2px}
.avatar-edit i{font-size:16px}
input[type=file]{display:none}
.card-name-input{font-size:17px;font-weight:500;color:#fff;background:transparent;border:none;outline:none;width:100%;border-bottom:1px solid transparent;transition:border-color .2s}
.card-name-input:focus{border-bottom-color:rgba(255,255,255,0.2)}
.card-sub-input{font-size:12px;color:rgba(255,255,255,0.45);background:transparent;border:none;outline:none;width:100%;margin-top:3px}
.overall-row{display:flex;align-items:flex-end;gap:6px}
.overall-num{font-size:48px;font-weight:500;color:#FAC775;line-height:1}
.overall-meta{font-size:11px;color:rgba(255,255,255,0.35);margin-bottom:7px;line-height:1.5}
.radar-wrap{padding:12px 20px 14px;background:#12122a}
.card-body{padding:14px 20px}
.section-title{font-size:10px;color:rgba(255,255,255,0.3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
.tag-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.tag{font-size:11px;padding:3px 8px;border-radius:20px;cursor:pointer}
.tag-s{background:#085041;color:#9FE1CB}
.tag-w{background:#4A1B0C;color:#F5C4B3}
.tag-add{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.3);border:1px dashed rgba(255,255,255,0.15)}
.coach-textarea{width:100%;font-size:12px;color:rgba(255,255,255,0.6);line-height:1.6;padding:10px 12px;background:rgba(255,255,255,0.04);border-radius:8px;border:1px solid rgba(255,255,255,0.06);border-left:2px solid #7F77DD;outline:none;resize:none;font-family:inherit;margin-bottom:4px}
.coach-textarea:focus{background:rgba(255,255,255,0.07)}
.upload-btn{display:flex;align-items:center;gap:8px;padding:8px 12px;border:1px dashed rgba(255,255,255,0.15);border-radius:8px;cursor:pointer;background:transparent;color:rgba(255,255,255,0.3);font-size:11px;width:100%;margin-top:10px}
.upload-btn:hover{background:rgba(255,255,255,0.04)}
.upload-btn i{font-size:16px}
</style>
</head>

        <div class="avatar-edit"><i class="ti ti-camera"></i><span>Photo</span></div>
      </div>
      <div style="flex:1">
        <input class="card-name-input" id="playerName" value="Boris Berthomet" placeholder="Nom du joueur">
        <input class="card-sub-input" id="playerSub" value="MTT Pro · Coach" placeholder="Rôle / Format">
      </div>
    </div>
    <div class="overall-row">
      <div class="overall-num" id="overallNum">72</div>
      <div class="overall-meta">Score global<br>/ 100</div>
    </div>
  </div>
  <input type="file" id="photoInput" accept="image/*">

  <div class="radar-wrap">
    <canvas id="radarChart" role="img" aria-label="Radar de compétences poker MTT" style="width:100%;max-height:200px">Radar de compétences.</canvas>
  </div>

  <div class="card-body">
    <div class="section-title">Points forts</div>
    <div class="tag-row" id="strengthTags">
      <span class="tag tag-s">Push/Fold</span>
      <span class="tag tag-s">Preflop ranges</span>
      <span class="tag tag-s">Squeeze</span>
      <span class="tag tag-s">SRP IP</span>
      <span class="tag tag-add" onclick="addTag('strength')">+ Ajouter</span>
    </div>

    <div class="section-title">Axes de progression</div>
    <div class="tag-row" id="weaknessTags">
      <span class="tag tag-w">River OOP</span>
      <span class="tag tag-w">FT ICM</span>
      <span class="tag tag-w">MW OOP</span>
      <span class="tag tag-w">PKO BP élevé</span>
      <span class="tag tag-add" onclick="addTag('weakness')">+ Ajouter</span>
    </div>

    <div class="section-title">Note du coach</div>
    <textarea class="coach-textarea" rows="3" placeholder="Note du coach...">Joueur très solide en preflop et push/fold. Grosse marge de progression en postflop OOP profond et en gestion ICM sur FT.</textarea>

    <button class="upload-btn" onclick="document.getElementById('photoInput').click()">
      <i class="ti ti-photo"></i> Changer la photo de profil
    </button>
  </div>
</div>

<script>
document.getElementById('photoInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const img = document.getElementById('avatarImg');
    img.src = ev.target.result;
    img.style.display = 'block';
    document.getElementById('avatarInitials').style.display = 'none';
  };
  reader.readAsDataURL(file);
});

document.getElementById('playerName').addEventListener('input', function() {
  const parts = this.value.trim().split(' ');
  const initials = parts.map(p => p[0]).join('').toUpperCase().slice(0,2);
  document.getElementById('avatarInitials').textContent = initials || 'BB';
});

function addTag(type) {
  const label = prompt(type === 'strength' ? 'Nouveau point fort :' : 'Nouvel axe de progression :');
  if (!label) return;
  const tag = document.createElement('span');
  tag.className = 'tag ' + (type === 'strength' ? 'tag-s' : 'tag-w');
  tag.textContent = label;
  const container = document.getElementById(type === 'strength' ? 'strengthTags' : 'weaknessTags');
  const addBtn = container.querySelector('.tag-add');
  container.insertBefore(tag, addBtn);
}

new Chart(document.getElementById('radarChart'), {
  type: 'radar',
  data: {
    labels: ['Preflop','Postflop','ICM / FT','PKO','Exploit','Mental'],
    datasets: [{
      data: [78, 67, 70, 68, 75, 72],
      backgroundColor: 'rgba(127,119,221,0.18)',
      borderColor: '#7F77DD',
      borderWidth: 1.5,
      pointBackgroundColor: '#7F77DD',
      pointRadius: 3,
      pointBorderColor: 'transparent',
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      r: {
        min: 0, max: 100,
        ticks: { stepSize: 25, color: 'rgba(255,255,255,0.2)', backdropColor: 'transparent', font: { size: 9 } },
        grid: { color: 'rgba(255,255,255,0.07)' },
        pointLabels: { color: 'rgba(255,255,255,0.45)', font: { size: 10 } },
        angleLines: { color: 'rgba(255,255,255,0.07)' },
      }
    }
  }
});
</script>
