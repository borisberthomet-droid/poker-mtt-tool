<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte Joueur — Scores</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0f1a;display:flex;justify-content:center;padding:16px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.card{width:100%;max-width:360px;border-radius:16px;border:1px solid rgba(255,255,255,0.08);background:#1c1c2e;overflow:hidden;padding:16px 20px}
.section-title{font-size:10px;color:rgba(255,255,255,0.3);margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em}
.stat-section{margin-bottom:16px}
.stat-item{margin-bottom:9px}
.stat-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.stat-label{font-size:12px;color:rgba(255,255,255,0.55)}
.stat-input{width:46px;font-size:12px;font-weight:500;color:#fff;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:4px;padding:2px 6px;text-align:center;outline:none;-moz-appearance:textfield}
.stat-input::-webkit-outer-spin-button,.stat-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.stat-input:focus{border-color:rgba(255,255,255,0.3)}
.bar-wrap{height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden}
.bar{height:100%;border-radius:2px;transition:width .4s ease}
.divider{height:1px;background:rgba(255,255,255,0.06);margin:14px 0}
.overall-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:rgba(255,255,255,0.04);border-radius:8px;margin-bottom:4px}
.overall-label{font-size:12px;color:rgba(255,255,255,0.4)}
.overall-val{font-size:22px;font-weight:500;color:#FAC775}
</style>
</head>
<body>
<div class="card">

  <div class="overall-row">
    <span class="overall-label">Score global</span>
    <span class="overall-val" id="overallNum">72</span>
  </div>

  <div class="divider"></div>

  <div class="stat-section">
    <div class="section-title">Preflop & short stack</div>
    <div id="stats-pf"></div>
  </div>

  <div class="divider"></div>

  <div class="stat-section">
    <div class="section-title">Postflop — détail</div>
    <div id="stats-pf2"></div>
  </div>

  <div class="divider"></div>

  <div class="stat-section">
    <div class="section-title">ICM · PKO · Mental · Exploit</div>
    <div id="stats-icm"></div>
  </div>

</div>

<script>
const statGroups = {
  pf: [
    {label:'Preflop général', val:78, hex:'#378ADD', key:'pf_general'},
    {label:'BvB',             val:74, hex:'#378ADD', key:'bvb'},
    {label:'Push/Fold',       val:82, hex:'#378ADD', key:'pushfold'},
    {label:'Resteal',         val:76, hex:'#378ADD', key:'resteal'},
  ],
  pf2: [
    {label:'SRP IP',          val:72, hex:'#1D9E75', key:'srp_ip'},
    {label:'SRP OOP',         val:60, hex:'#1D9E75', key:'srp_oop'},
    {label:'3bet pot IP',     val:68, hex:'#1D9E75', key:'p3b_ip'},
    {label:'3bet pot OOP',    val:62, hex:'#1D9E75', key:'p3b_oop'},
    {label:'MW IP',           val:65, hex:'#1D9E75', key:'mw_ip'},
    {label:'MW OOP',          val:55, hex:'#1D9E75', key:'mw_oop'},
  ],
  icm: [
    {label:'ICM / FT',        val:70, hex:'#EF9F27', key:'icm'},
    {label:'PKO',             val:68, hex:'#D85A30', key:'pko'},
    {label:'Exploit',         val:75, hex:'#7F77DD', key:'exploit'},
    {label:'Mental',          val:72, hex:'#D4537E', key:'mental'},
  ],
};

const allStats = [...statGroups.pf, ...statGroups.pf2, ...statGroups.icm];

function updateOverall() {
  const avg = Math.round(allStats.reduce((s,i) => s + i.val, 0) / allStats.length);
  document.getElementById('overallNum').textContent = avg;
}

function renderStats(id, items) {
  document.getElementById(id).innerHTML = items.map(s => `
    <div class="stat-item">
      <div class="stat-row">
        <span class="stat-label">${s.label}</span>
        <input class="stat-input" type="number" min="0" max="100" value="${s.val}" data-key="${s.key}" onchange="updateStat(this)">
      </div>
      <div class="bar-wrap"><div class="bar" id="bar_${s.key}" style="width:${s.val}%;background:${s.hex}"></div></div>
    </div>
  `).join('');
}

function updateStat(input) {
  const key = input.dataset.key;
  const val = Math.min(100, Math.max(0, parseInt(input.value) || 0));
  input.value = val;
  const stat = allStats.find(s => s.key === key);
  if (stat) {
    stat.val = val;
    const bar = document.getElementById('bar_' + key);
    if (bar) bar.style.width = val + '%';
    updateOverall();
  }
}

renderStats('stats-pf',  statGroups.pf);
renderStats('stats-pf2', statGroups.pf2);
renderStats('stats-icm', statGroups.icm);
</script>
</body>
</html>
