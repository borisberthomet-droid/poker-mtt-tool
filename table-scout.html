<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Table Scout — Poker MTT Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f0e;
    --bg2: #141716;
    --bg3: #1c201e;
    --border: #2a2f2c;
    --border2: #3a403c;
    --text: #e8ede9;
    --text2: #8a9690;
    --text3: #566058;
    --green: #4ade80;
    --green-dim: #1a3326;
    --green-mid: #22c55e;
    --amber: #fbbf24;
    --amber-dim: #2d2208;
    --red: #f87171;
    --red-dim: #2d1010;
    --accent: #4ade80;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 1.25rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: var(--text);
    text-decoration: none;
  }

  .logo-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
  }

  .badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 100px;
    border: 1px solid var(--border2);
    color: var(--text3);
    letter-spacing: 0.05em;
  }

  main {
    flex: 1;
    padding: 2.5rem 2rem;
    max-width: 960px;
    margin: 0 auto;
    width: 100%;
  }

  .page-title {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }

  .page-sub {
    font-size: 14px;
    color: var(--text2);
    margin-bottom: 2rem;
  }

  /* API KEY INPUT */
  .api-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1.5rem;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
  }

  .api-row label {
    font-size: 12px;
    color: var(--text2);
    font-family: 'DM Mono', monospace;
    white-space: nowrap;
    letter-spacing: 0.04em;
  }

  .api-row input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    min-width: 0;
  }

  .api-row input::placeholder { color: var(--text3); }

  .api-row .toggle-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text3);
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    padding: 2px 6px;
    border-radius: 4px;
    transition: color 0.15s;
  }
  .api-row .toggle-btn:hover { color: var(--text2); }

  /* DROP ZONE */
  .drop-zone {
    border: 1.5px dashed var(--border2);
    border-radius: 14px;
    padding: 3rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    background: var(--bg2);
    position: relative;
    margin-bottom: 1.5rem;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--green);
    background: #111a14;
  }

  .drop-zone input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }

  .drop-icon {
    width: 48px; height: 48px;
    border-radius: 12px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1rem;
    font-size: 22px;
  }

  .drop-label {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }

  .drop-sub {
    font-size: 13px;
    color: var(--text3);
  }

  /* PREVIEW */
  #previewImg {
    width: 100%;
    border-radius: 12px;
    margin-bottom: 1.5rem;
    display: none;
    border: 1px solid var(--border);
  }

  /* ANALYZE BUTTON */
  .btn-analyze {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: var(--green);
    color: #0a1a0d;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.01em;
    transition: opacity 0.15s, transform 0.1s;
    display: none;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 2rem;
  }

  .btn-analyze:hover { opacity: 0.9; }
  .btn-analyze:active { transform: scale(0.99); }
  .btn-analyze:disabled { opacity: 0.4; cursor: not-allowed; }

  /* STATUS */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 1.5rem;
    display: none;
  }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border2);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* RESULTS */
  .results-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 1rem;
  }

  .results-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text3);
  }

  .results-count {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text3);
  }

  .players-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }

  /* PLAYER CARD */
  .player-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .player-card:hover { border-color: var(--border2); }

  .player-card.is-hero {
    border-color: var(--green-mid);
    background: #0e1f14;
  }

  .card-top {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .avatar {
    width: 42px; height: 42px;
    border-radius: 10px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    font-size: 14px;
    color: var(--text2);
    flex-shrink: 0;
    letter-spacing: 0.05em;
  }

  .avatar.hero-av {
    background: var(--green-dim);
    border-color: var(--green-mid);
    color: var(--green);
  }

  .player-info { flex: 1; min-width: 0; }

  .player-name-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 3px;
  }

  .player-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .hero-tag {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 100px;
    background: var(--green-dim);
    color: var(--green);
    border: 1px solid var(--green-mid);
    letter-spacing: 0.06em;
    flex-shrink: 0;
  }

  .player-meta {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text2);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .stack-val { color: var(--amber); }

  .flag { font-size: 14px; }

  /* NAME EDIT */
  .name-edit-row {
    padding: 0 16px 12px;
    display: flex;
    gap: 6px;
  }

  .name-input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 6px 10px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .name-input:focus { border-color: var(--border2); }

  /* LINKS */
  .card-links {
    border-top: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .link-pill {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 100px;
    border: 1px solid var(--border2);
    color: var(--text2);
    text-decoration: none;
    letter-spacing: 0.03em;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
    cursor: pointer;
    white-space: nowrap;
  }
  .link-pill:hover {
    border-color: var(--green);
    color: var(--green);
    background: var(--green-dim);
  }

  .link-pill.google:hover { border-color: var(--amber); color: var(--amber); background: var(--amber-dim); }

  /* ERROR */
  .error-box {
    background: var(--red-dim);
    border: 1px solid var(--red);
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 13px;
    color: var(--red);
    margin-bottom: 1rem;
    display: none;
  }

  /* RESET */
  .btn-reset {
    background: none;
    border: 1px solid var(--border2);
    color: var(--text2);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 1.5rem;
    transition: border-color 0.15s, color 0.15s;
    display: none;
  }
  .btn-reset:hover { border-color: var(--border2); color: var(--text); }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--border);
    padding: 1rem 2rem;
    font-size: 12px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.03em;
    text-align: center;
  }

  /* FLAG MAP */
  .country-flags { US:"🇺🇸", FR:"🇫🇷", GB:"🇬🇧", DE:"🇩🇪", CA:"🇨🇦", AU:"🇦🇺", ES:"🇪🇸", IT:"🇮🇹", PT:"🇵🇹", BR:"🇧🇷", NL:"🇳🇱", BE:"🇧🇪", RU:"🇷🇺", UA:"🇺🇦", PL:"🇵🇱" }
</style>
</head>
<body>

<header>
  <a class="logo" href="#">
    <div class="logo-dot"></div>
    Table Scout
  </a>
  <span class="badge">MTT TOOL</span>
</header>

<main>
  <h1 class="page-title">Scout ta table</h1>
  <p class="page-sub">Upload une screenshot → les joueurs sont détectés automatiquement</p>

  <div class="api-row">
    <label>API KEY</label>
    <input type="password" id="apiKey" placeholder="sk-ant-api03-..." autocomplete="off">
    <button class="toggle-btn" id="toggleKey" onclick="toggleKey()">show</button>
  </div>

  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept="image/*">
    <div class="drop-icon">📷</div>
    <p class="drop-label">Glisse ta screenshot ici</p>
    <p class="drop-sub">ou clique pour sélectionner · JPG, PNG, WEBP</p>
  </div>

  <img id="previewImg" alt="Screenshot de la table">

  <button class="btn-analyze" id="btnAnalyze" onclick="analyze()">
    <span id="btnText">🔍 Analyser les joueurs</span>
  </button>

  <button class="btn-reset" id="btnReset" onclick="reset()">↩ Nouvelle analyse</button>

  <div class="status-bar" id="statusBar">
    <div class="spinner"></div>
    <span id="statusText">Analyse en cours...</span>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div id="resultsArea"></div>
</main>

<footer>Boris Berthomet · Poker MTT Tool · Table Scout</footer>

<script>
const FLAGS = {US:"🇺🇸",FR:"🇫🇷",GB:"🇬🇧",DE:"🇩🇪",CA:"🇨🇦",AU:"🇦🇺",ES:"🇪🇸",IT:"🇮🇹",PT:"🇵🇹",BR:"🇧🇷",NL:"🇳🇱",BE:"🇧🇪",RU:"🇷🇺",UA:"🇺🇦",PL:"🇵🇱",SE:"🇸🇪",NO:"🇳🇴",DK:"🇩🇰",FI:"🇫🇮",AT:"🇦🇹",CH:"🇨🇭"};

let imageBase64 = null;
let imageMediaType = 'image/jpeg';
let detectedPlayers = [];

const fileInput = document.getElementById('fileInput');
const dropZone = document.getElementById('dropZone');
const previewImg = document.getElementById('previewImg');
const btnAnalyze = document.getElementById('btnAnalyze');
const btnReset = document.getElementById('btnReset');
const statusBar = document.getElementById('statusBar');
const errorBox = document.getElementById('errorBox');
const resultsArea = document.getElementById('resultsArea');

// Save/load API key
const savedKey = localStorage.getItem('scout_api_key');
if (savedKey) document.getElementById('apiKey').value = savedKey;

document.getElementById('apiKey').addEventListener('change', e => {
  localStorage.setItem('scout_api_key', e.target.value);
});

function toggleKey() {
  const inp = document.getElementById('apiKey');
  const btn = document.getElementById('toggleKey');
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = 'hide'; }
  else { inp.type = 'password'; btn.textContent = 'show'; }
}

// Drag & drop
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) loadFile(file);
});

fileInput.addEventListener('change', e => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
});

function loadFile(file) {
  imageMediaType = file.type || 'image/jpeg';
  const reader = new FileReader();
  reader.onload = ev => {
    imageBase64 = ev.target.result.split(',')[1];
    previewImg.src = ev.target.result;
    previewImg.style.display = 'block';
    btnAnalyze.style.display = 'flex';
    dropZone.style.display = 'none';
    errorBox.style.display = 'none';
    resultsArea.innerHTML = '';
    btnReset.style.display = 'none';
  };
  reader.readAsDataURL(file);
}

function reset() {
  imageBase64 = null;
  previewImg.style.display = 'none';
  previewImg.src = '';
  btnAnalyze.style.display = 'none';
  btnReset.style.display = 'none';
  dropZone.style.display = 'block';
  fileInput.value = '';
  errorBox.style.display = 'none';
  resultsArea.innerHTML = '';
  statusBar.style.display = 'none';
}

async function analyze() {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { showError('Entre ta clé API Anthropic en haut de la page.'); return; }
  if (!imageBase64) { showError('Sélectionne d\'abord une image.'); return; }

  btnAnalyze.disabled = true;
  document.getElementById('btnText').textContent = 'Analyse en cours...';
  statusBar.style.display = 'flex';
  errorBox.style.display = 'none';
  resultsArea.innerHTML = '';

  const prompt = `Tu es un assistant poker expert. Analyse cette screenshot d'une table de poker en ligne (WSOP, PokerStars, GGPoker, etc.).

Extrais tous les joueurs visibles avec leurs informations.
Réponds UNIQUEMENT en JSON valide, sans backticks ni texte autour, format exact :
{
  "players": [
    {
      "name": "Nom complet exact du joueur tel qu'affiché",
      "stack": "montant exact en chips (ex: 235.0K, 1,234,567)",
      "country": "code pays ISO 2 lettres si drapeau visible (US, FR, GB...) ou null",
      "is_hero": true ou false (true si le nom est surligné/coloré différemment = c'est le joueur principal)
    }
  ]
}

Important: inclus TOUS les joueurs visibles. Si un nom est tronqué, mets-le tel quel.`;

  try {
    const response = await fetch("https://poker-scout-proxy.borisberthomet.workers.dev/", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
      },
      body: JSON.stringify({
        route: "anthropic",
        payload: {
          model: "claude-haiku-4-5-20251001",
          max_tokens: 1000,
          messages: [{
            role: "user",
            content: [
              { type: "image", source: { type: "base64", media_type: imageMediaType, data: imageBase64 } },
              { type: "text", text: prompt }
            ]
          }]
        }
      })
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || `HTTP ${response.status}`);
    }

    const data = await response.json();
    const text = data.content.map(i => i.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);
    detectedPlayers = parsed.players || [];

    statusBar.style.display = 'none';
    btnAnalyze.style.display = 'none';
    btnReset.style.display = 'block';
    renderResults();

  } catch (err) {
    statusBar.style.display = 'none';
    btnAnalyze.disabled = false;
    document.getElementById('btnText').textContent = '🔍 Analyser les joueurs';
    showError('Erreur : ' + err.message + ' | ' + (err.stack || ''));
  }
}

function showError(msg) {
  errorBox.textContent = '⚠ ' + msg;
  errorBox.style.display = 'block';
}

function initials(name) {
  return (name || '?').split(' ').map(w => w[0] || '').join('').toUpperCase().slice(0, 2) || '??';
}

function flag(code) {
  return code && FLAGS[code.toUpperCase()] ? FLAGS[code.toUpperCase()] : '';
}

function hendonUrl(name) { return `https://www.thehendonmob.com/search?q=${encodeURIComponent(name)}&cat=players`; }
function p5Url(name) { return `https://www.pocketfives.com/search/?search=${encodeURIComponent(name)}`; }
function wsopUrl(name) { return `https://www.wsop.com/players/search/?search=${encodeURIComponent(name)}`; }
function googleUrl(name) { return `https://www.google.com/search?q=${encodeURIComponent(name + ' poker')}`; }

function renderResults() {
  const hero = detectedPlayers.find(p => p.is_hero);
  const opponents = detectedPlayers.filter(p => !p.is_hero);

  let html = '';

  if (hero) {
    html += `<div class="results-header"><span class="results-title">Hero</span></div>`;
    html += `<div class="players-grid" style="margin-bottom:1.5rem;">${renderCard(hero, 0)}</div>`;
  }

  if (opponents.length > 0) {
    html += `<div class="results-header">
      <span class="results-title">Opponents</span>
      <span class="results-count">${opponents.length} joueur${opponents.length > 1 ? 's' : ''}</span>
    </div>`;
    html += `<div class="players-grid">`;
    opponents.forEach((p, i) => { html += renderCard(p, i); });
    html += `</div>`;
  }

  resultsArea.innerHTML = html;
}

function renderCard(player, idx) {
  const ini = initials(player.name);
  const f = flag(player.country);
  const heroCard = player.is_hero;
  const editId = `name_${idx}_${Date.now()}`;

  return `
    <div class="player-card ${heroCard ? 'is-hero' : ''}">
      <div class="card-top">
        <div class="avatar ${heroCard ? 'hero-av' : ''}">${ini}</div>
        <div class="player-info">
          <div class="player-name-row">
            <span class="player-name" id="pname_${idx}">${escHtml(player.name)}</span>
            ${heroCard ? '<span class="hero-tag">HERO</span>' : ''}
          </div>
          <div class="player-meta">
            <span class="stack-val">${escHtml(player.stack || '—')}</span>
            ${f ? `<span class="flag">${f}</span>` : ''}
            ${player.country ? `<span>${player.country}</span>` : ''}
          </div>
        </div>
      </div>
      ${!heroCard ? `
      <div class="name-edit-row">
        <input class="name-input" id="${editId}" value="${escHtml(player.name)}" placeholder="Corriger le nom...">
      </div>
      <div class="card-links">
        <a class="link-pill" href="#" onclick="openLink(document.getElementById('${editId}').value, 'hendon'); return false;">Hendon Mob</a>
        <a class="link-pill" href="#" onclick="openLink(document.getElementById('${editId}').value, 'p5'); return false;">PocketFives</a>
        <a class="link-pill" href="#" onclick="openLink(document.getElementById('${editId}').value, 'wsop'); return false;">WSOP</a>
        <a class="link-pill google" href="#" onclick="openLink(document.getElementById('${editId}').value, 'google'); return false;">Google</a>
      </div>` : ''}
    </div>
  `;
}

function openLink(name, site) {
  const n = (name || '').trim();
  if (!n) return;
  const urls = { hendon: hendonUrl(n), p5: p5Url(n), wsop: wsopUrl(n), google: googleUrl(n) };
  window.open(urls[site], '_blank', 'noopener');
}

function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
